openapi: '3.0.3'
info:
  title: Escopo - Trabalho de Conclusão de Curso SENAI
  version: '1.0'
  description: Documentação das rotas da API do projeto Escopo.

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Usuario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Nathan
        email:
          type: string
          example: nathan@email.com

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: jwt-token
        usuario:
          $ref: '#/components/schemas/Usuario'

    Erro:
      type: object
      properties:
        codigo:
          type: integer
        status:
          type: string
        mensagem:
          type: string
        rota:
          type: string
        data_hora:
          type: string

    ErroCampos:
      type: object
      properties:
        codigo:
          type: integer
        status:
          type: string
        erros:
          type: array
          items:
            type: object
            properties:
              campo:
                type: string
              mensagem:
                type: string
        rota:
          type: string
        data_hora:
          type: string

    DocumentoDoDashboard:
      type: object
      properties:
        id:
          type: number
          example: 1
        projeto:
          type: string
          example: Sistema de Gestão
        categoria:
          type: string
          example: Plataforma Web
        documento:
          type: string
          example: Documento de Requisitos
        ultima_edicao:
          type: string
          format: date-time
          example: '2025-01-03T05:00:00.000Z'

    ConviteDoDashboard:
      type: object
      properties:
        id:
          type: number
          example: 1
        projeto_id:
          type: number
          example: 1
        nome_remetente:
          type: string
          example: Nathan
        nome_projeto:
          type: string
          example: Projeto teste1
        criado_em:
          type: string
          example: '12:12:12'
        status:
          type: object
          properties:
            id:
              type: number
              example: 1
            nome:
              type: string
              example: 'pendente'

    Dashboard:
      type: object
      properties:
        documentos:
          type: array
          items:
            $ref: '#/components/schemas/DocumentoDoDashboard'
        convites:
          type: array
          items:
            $ref: '#/components/schemas/ConviteDoDashboard'
    IntegranteProjeto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nivel_acesso_id:
          type: integer
          example: 2

    UsuarioList:
      type: object
      properties:
        id:
          type: number
          example: 1
        nome:
          type: string
          example: Nathan
        email:
          type: string
          example: nathan@email.com
        foto_perfil:
          type: string
          example: https://example.com/image.jpg

    ProjetoList:
      type: object
      properties:
        id:
          type: integer
          example: 1
        titulo:
          type: string
          example: Meu Projeto
        descricao:
          type: string
          example: Descrição do projeto
        foto_usuarios:
          type: array
          items:
            type: string
          example: ['https://example.com/image1.jpg', 'https://example.com/image2.jpg']

    ProjetoParticipante:
      type: object
      properties:
        nome:
          type: string
          example: Ana Livia
        email:
          type: string
          example: ana@email.com
        projeto_id:
          type: integer
          example: 1
        usuario_id:
          type: integer
          example: 1
        foto_perfil:
          type: string
          nullable: true
          example: null
        nivel_acesso:
          type: string
          example: Gerente de Projeto
        nivel_acesso_id:
          type: integer
          example: 1
        usuario_projeto_id:
          type: integer
          example: 1

    ProjetoParticipantePendente:
      type: object
      properties:
        nome:
          type: string
          example: Marcos Santos
        email:
          type: string
          example: marcos@email.com
        projeto_id:
          type: integer
          example: 1
        usuario_id:
          type: integer
          example: 3
        foto_perfil:
          type: string
          nullable: true
          example: null
        convidado_em:
          type: string
          example: '2025-01-01 03:48:00.000000'
        nivel_acesso:
          type: string
          example: Analista de Requisitos
        nivel_acesso_id:
          type: integer
          example: 2

    ProjetoParticipantes:
      type: object
      properties:
        projeto_id:
          type: integer
          example: 1
        participantes:
          type: array
          items:
            $ref: '#/components/schemas/ProjetoParticipante'
        pendentes:
          type: array
          items:
            $ref: '#/components/schemas/ProjetoParticipantePendente'

    ProjetoDetail:
      type: object
      properties:
        id:
          type: integer
          example: 1
        titulo:
          type: string
          example: Meu Projeto
        descricao:
          type: string
          example: Descrição do projeto
        status:
          type: boolean
          example: true
        data_criacao:
          type: string
          format: date-time
          example: '2026-04-14T10:00:00Z'
        ultima_atualizacao:
          type: string
          format: date-time
          example: '2026-04-14T12:00:00Z'
        nome_responsavel:
          type: string
          example: Nathan
        criador_id:
          type: integer
          example: 1
        nivel_acesso_id:
          type: integer
          example: 2

    Registro:
      type: object
      properties:
        id:
          type: number
          example: 1
        titulo:
          type: string
          example: Registro de Reunião
        conteudo:
          type: string
          example: Conteúdo do registro
        atualizado_em:
          type: string
          format: date-time
          example: '2026-04-14T10:00:00Z'
        criado_em:
          type: string
          format: date-time
          example: '2026-04-14T10:00:00Z'

    Documento:
      type: object
      properties:
        id:
          type: number
          example: 1
        titulo:
          type: string
          example: Documento de Requisitos
        quantidade_versoes:
          type: integer
          example: 3
        ultima_alteracao:
          type: string
          format: date
          example: '2026-04-14'

    CategoriaDocumentacao:
      type: object
      properties:
        id:
          type: number
          example: 1
        nome:
          type: string
          example: Requisitos
        documentos:
          type: array
          items:
            $ref: '#/components/schemas/Documento'

    ProjetoDocumentacaoResponse:
      type: object
      properties:
        projeto:
          type: object
          properties:
            id:
              type: integer
              example: 1
            categorias:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  nome:
                    type: string
                    example: Plataforma Web
                  documentos:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        titulo:
                          type: string
                          example: Documento de Requisitos
                        ultima_alteracao:
                          type: string
                          example: '2025-02-12 23:00:00.000000'
                        quantidade_versoes:
                          type: integer
                          example: 5

    Reuniao:
      type: object
      properties:
        titulo:
          type: string
          example: Reunião de Planejamento
        criado_em:
          type: string
          format: date-time
          example: '2026-04-14T10:00:00Z'
        foto_usuarios:
          type: array
          items:
            type: string
          example: ['https://example.com/image1.jpg', 'https://example.com/image2.jpg']

    ReuniaoResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        titulo:
          type: string
          example: Reunião de Planejamento

    Link:
      type: object
      properties:
        id:
          type: integer
          example: 1
        url:
          type: string
          example: https://example.com/link
        nome:
          type: string
          example: Link da Reunião
        tipo_link:
          type: string
          example: reuniao

    LinkRequest:
      type: object
      required:
        - url
        - tipo_link_id
        - nome
      properties:
        url:
          type: string
          example: figma.com
        tipo_link_id:
          type: integer
          example: 2
        nome:
          type: string
          example: Link do Figma

    Convidado:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: João Silva
        cargo:
          type: string
          example: Desenvolvedor

    UsuarioReuniao:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Nathan
        cargo:
          type: string
          example: Gerente
        foto_perfil:
          type: string
          example: https://example.com/image.jpg

    ReuniaoDetail:
      type: object
      properties:
        id:
          type: integer
          example: 1
        titulo:
          type: string
          example: Reunião de Planejamento
        criado_em:
          type: string
          format: date-time
          example: '2026-04-14T10:00:00Z'
        projeto_id:
          type: integer
          example: 1
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        convidados:
          type: array
          items:
            $ref: '#/components/schemas/Convidado'
        usuarios:
          type: array
          items:
            $ref: '#/components/schemas/UsuarioReuniao'

    HistoricoVersaoDocumento:
      type: object
      properties:
        id:
          type: integer
          example: 1
        criado_em:
          type: string
          format: date-time
          example: '2026-04-14T10:00:00Z'

    VersaoDocumento:
      type: object
      properties:
        id:
          type: integer
          example: 1
        titulo:
          type: string
          example: Documento de Requisitos
        conteudo:
          type: string
          example: Conteúdo da versão do documento
        criado_em:
          type: string
          format: date-time
          example: '2026-04-14T10:00:00Z'

    DocumentoVersaoRequest:
      type: object
      required:
        - conteudo
      properties:
        conteudo:
          type: string
          example: Conteúdo da nova versão do documento
          minLength: 1

    ProjetoRequest:
      type: object
      required:
        - titulo
      properties:
        titulo:
          type: string
          example: Meu Projeto
          minLength: 1
          maxLength: 100
        descricao:
          type: string
          example: Descrição do projeto
        integrantes:
          type: array
          items:
            $ref: '#/components/schemas/IntegranteProjeto'

    Comentario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        conteudo:
          type: string
          example: Hello world comentando aqui dá like favorito se inscreve no canal
        criado_em:
          type: string
          format: date-time
          example: '2026-04-01T07:30:00Z'
        parent_id:
          type: integer
          nullable: true
          example: null
        registro_referencia:
          type: integer
          nullable: true
          example: null
        comentario_tipo:
          type: object
          properties:
            id:
              type: integer
              example: 1
            nome:
              type: string
              example: comentario

    ComentarioTipo:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: comentario

    ComentarioRequest:
      type: object
      required:
        - conteudo
      properties:
        conteudo:
          type: string
          example: Hello world comentando aqui dá like favorito se inscreve no canal
        parent_id:
          type: integer
          nullable: true
          example: null
        registro_referencia_id:
          type: integer
          nullable: true
          example: null
        comentario_tipo_id:
          type: integer
          nullable: true
          example: 1

    Notificacao:
      type: object
      properties:
        id:
          type: integer
          example: 1
        descricao:
          type: string
          example: 'Ana Livia comentou no documento "Documento de Requisitos"'
        data:
          type: string
          example: '2026-05-05 21:21:16'
        aberto:
          type: integer
          example: 0
        comentario_id:
          type: integer
          example: 1
        documento_id:
          type: integer
          example: 1

paths:
  /api/v1/auth/cadastrar:
    post:
      tags:
        - Autenticação
      summary: Cadastra um usuário

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - email
                - senha
              properties:
                nome:
                  type: string
                  example: Nathan
                  maxLength: 100
                  minLength: 1
                email:
                  type: string
                  example: nathan@email.com
                  maxLength: 150
                  minLength: 6
                senha:
                  type: string
                  example: 12345678
                  maxLength: 64
                  minLength: 8

      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'

        '409':
          description: E-mail informado já existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

        '400':
          description: Requisição mal formulada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

        '422':
          description: Campos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroCampos'

        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /api/v1/auth/login:
    post:
      tags:
        - Autenticação
      summary: Autentica um usuário

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - senha
              properties:
                email:
                  type: string
                  example: nathan@email.com
                  maxLength: 150
                  minLength: 6
                senha:
                  type: string
                  example: 12345678
                  maxLength: 64
                  minLength: 8

      responses:
        '200':
          description: Login realizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

        '400':
          description: Requisição mal formulada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

        '422':
          description: Campos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroCampos'

        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /api/v1/dashboard:
    get:
      tags:
        - Dashboard
      summary: Retorna dados do dashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /api/v1/usuario/nome:
    patch:
      tags:
        - Usuário
      summary: Atualiza o nome do usuário autenticado
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
              properties:
                nome:
                  type: string
                  example: Nathan
                  minLength: 1
                  maxLength: 100
      responses:
        '204':
          description: Nome alterado
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '400':
          description: Requisição mal formulada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '422':
          description: Nome inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroCampos'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /api/v1/usuario/foto-perfil:
    patch:
      tags:
        - Usuário
      summary: Atualiza a foto de perfil do usuário autenticado
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - foto_perfil
              properties:
                foto_perfil:
                  type: string
                  format: uri
                  minLength: 1
                  maxLength: 512
                  example: https://example.com/image.jpg
      responses:
        '204':
          description: Foto de perfil alterada
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '400':
          description: Requisição mal formulada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '422':
          description: Foto de perfil inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroCampos'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /api/v1/usuario/senha:
    patch:
      tags:
        - Usuário
      summary: Altera a senha do usuário autenticado
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - senha_atual
                - senha_nova
              properties:
                senha_atual:
                  type: string
                  example: 12345678
                  maxLength: 64
                  minLength: 8
                senha_nova:
                  type: string
                  example: 87654321
                  maxLength: 64
                  minLength: 8
      responses:
        '204':
          description: Senha alterada
        '400':
          description: Requisição mal formulada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '422':
          description: Senha inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroCampos'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /api/v1/usuario:
    delete:
      tags:
        - Usuário
      summary: Exclui o usuário autenticado
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Usuário excluído
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /api/v1/usuario/email/{email}:
    get:
      tags:
        - Usuário
      summary: Busca um usuário pelo email
      security:
        - bearerAuth: []
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
            minLength: 6
            maxLength: 150
          description: Email do usuário a ser buscado
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioList'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /api/v1/notificacoes:
    get:
      tags:
        - Notificações
      summary: Retorna notificações do usuário autenticado pelo token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notificações encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notificacao'
              examples:
                notificacoesUsuario:
                  summary: Exemplo de lista de notificações
                  value:
                    - id: 1
                      descricao: 'Ana Livia comentou no documento "Documento de Requisitos"'
                      data: '2026-05-05 21:21:16'
                      aberto: 0
                      comentario_id: 1
                      documento_id: 1
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /api/v1/notificacao/{id}:
    patch:
      tags:
        - Notificações
      summary: Marca notificação como lida
      description: Atualiza o campo aberto para 1 quando o usuário visualiza a notificação.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID da notificação
      responses:
        '200':
          description: Notificação atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notificacao'
              examples:
                notificacaoAtualizada:
                  summary: Exemplo de notificação marcada como lida
                  value:
                    id: 1
                    descricao: 'Ana Livia comentou no documento "Documento de Requisitos"'
                    data: '2026-05-05 21:21:16'
                    aberto: 1
                    comentario_id: 1
                    documento_id: 1
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '404':
          description: Notificação não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /api/v1/projeto:
    post:
      tags:
        - Projeto
      summary: Cria um novo projeto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
